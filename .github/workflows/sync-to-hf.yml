name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug secret values
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          python -c "
          import os
          username = os.environ['HF_USERNAME']
          space_name = os.environ['HF_SPACE_NAME']

          def diagnose(name, value):
              print(f'{name} length: {len(value)}')
              print(f'{name} starts with whitespace: {value != value.lstrip()}')
              print(f'{name} ends with whitespace: {value != value.rstrip()}')
              print(f'{name} contains double-quote: {chr(34) in value}')
              print(f'{name} contains single-quote: {chr(39) in value}')
              print(f'{name} contains slash: {chr(47) in value}')
              print(f'{name} contains newline: {chr(10) in value}')
              print(f'{name} first char code: {ord(value[0]) if value else \"EMPTY\"}')
              print(f'{name} last char code: {ord(value[-1]) if value else \"EMPTY\"}')

          diagnose('username', username)
          diagnose('space_name', space_name)
          "