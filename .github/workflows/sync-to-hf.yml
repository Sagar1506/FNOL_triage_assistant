name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Verify secrets are set
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ]; then echo "HF_TOKEN is EMPTY"; else echo "HF_TOKEN is set (length: ${#HF_TOKEN})"; fi
          if [ -z "$HF_USERNAME" ]; then echo "HF_USERNAME is EMPTY"; else echo "HF_USERNAME is set: $HF_USERNAME"; fi
          if [ -z "$HF_SPACE_NAME" ]; then echo "HF_SPACE_NAME is EMPTY"; else echo "HF_SPACE_NAME is set: $HF_SPACE_NAME"; fi

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          git push hf main:main --force